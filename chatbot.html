<!DOCTYPE html>

 <html lang="zh-CN">

 <head>

     <meta charset="UTF-8">

     <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <title>临夏砖雕 · 非遗智能体</title>

     <style>

         * {

             margin: 0;

             padding: 0;

             box-sizing: border-box;

         }

 

         body {

             background: white;

             height: 100vh;

             display: flex;

             justify-content: center;

             align-items: center;

             font-family: system-ui, -apple-system, sans-serif;

             overflow: hidden;

         }

 

         /* 外层容器：固定宽度，让聊天区域完整显示 */

         .chat-wrapper {

             width: 100%;

             max-width: 1100px;    /* 增大宽度，让文字有足够空间 */

             height: 100vh;

             position: relative;

             background: white;

             box-shadow: 0 0 20px rgba(0,0,0,0.05);

             overflow: hidden;

         }

 

         /* iframe 容器：只做顶部偏移，不做右侧裁剪 */

         .iframe-container {

             position: absolute;

             top: -50px;           /* 向上偏移，隐藏顶部横幅 */

             left: 0;

             width: 100%;          /* 宽度改为100%，不再裁剪右侧 */

             height: calc(100% + 60px);

             overflow: visible;    /* 允许内容完整显示 */

         }

 

         iframe {

             width: 100%;

             height: 100%;

             border: none;

             position: absolute;

             top: 0;

             left: 0;

         }

 

         /* 中等屏幕适配 */

         @media (max-width: 1200px) {

             .chat-wrapper {

                 max-width: 95vw;

             }

         }

 

         /* 手机屏幕适配 */

         @media (max-width: 768px) {

             .chat-wrapper {

                 max-width: 100vw;

             }

         }

     </style>

 </head>

 <body>

 <div class="chat-wrapper">

     <div class="iframe-container">

         <iframe

             src="https://www.coze.cn/s/LWWU1X2b_M0/"

             allow="microphone *; camera *; autoplay *"

             title="临夏砖雕非遗智能体"

         ></iframe>

     </div>

 </div>

 </body>

 </html>
